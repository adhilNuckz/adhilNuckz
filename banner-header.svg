<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffcc" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#00ffcc" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="220" fill="url(#bg)"/>

  <path fill="url(#wave)">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="
        M0,180 C250,140 750,220 1000,180 L1000,220 L0,220 Z;
        M0,190 C250,220 750,140 1000,190 L1000,220 L0,220 Z;
        M0,180 C250,140 750,220 1000,180 L1000,220 L0,220 Z" />
  </path>

  <text x="500" y="105" font-family="Segoe UI, Verdana, sans-serif" font-size="46" font-weight="700"
        fill="#00ffcc" text-anchor="middle">
    ADHIL MARZOOK
    <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>
  </text>

  <text x="500" y="145" font-family="Segoe UI, Verdana, sans-serif" font-size="17"
        fill="#c9d1d9" text-anchor="middle">
    Full-Stack Developer · Systems &amp; DevOps · AI-Augmented Builder
    <animate attributeName="opacity" values="0;0;1" dur="2s" fill="freeze"/>
  </text>
</svg>
